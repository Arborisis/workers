name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  lint-and-typecheck:
    name: Lint and Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        worker:
          - arborisis-ai-agent
          - audio-analysis-orchestrator
          - audio-analyzer-container
          - r2-proxy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.worker }}/package-lock.json

      - name: Install dependencies
        working-directory: ./${{ matrix.worker }}
        run: npm ci

      - name: Run TypeScript check
        working-directory: ./${{ matrix.worker }}
        run: npx tsc --noEmit

      - name: Run linter
        working-directory: ./${{ matrix.worker }}
        run: npm run lint || echo "No lint script configured"

  deploy-workers:
    name: Deploy Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    needs: lint-and-typecheck
    strategy:
      matrix:
        worker:
          - arborisis-ai-agent
          - audio-analysis-orchestrator
          - audio-analyzer-container
          - r2-proxy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.worker }}/package-lock.json

      - name: Install dependencies
        working-directory: ./${{ matrix.worker }}
        run: npm ci

      - name: Deploy to Cloudflare
        working-directory: ./${{ matrix.worker }}
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint-and-typecheck

    steps:
      - name: Write summary
        run: |
          {
            echo "## Workers CI Summary"
            echo ""
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| Lint and Typecheck | ${{ needs.lint-and-typecheck.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on critical job failure
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
