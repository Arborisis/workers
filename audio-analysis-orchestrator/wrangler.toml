name = "arborisis-audio-analysis-orchestrator"
main = "src/index.ts"
compatibility_date = "2026-05-10"
account_id = "bc36459259b257fdbaf4252f06bcb690"

[vars]
# Fallback URL - Mettre à jour après migration des audio services
# Utiliser wrangler secret put ANALYZER_URLS pour configurer l'URL finale
ANALYZER_URL = "https://arborisis.laravel.cloud/analyzer"

# Exemple pour Railway/Render : https://audio-services-xxxxx.up.railway.app
# Utiliser wrangler secret put ANALYZER_URLS avec l'URL définitive

[[queues.consumers]]
queue = "audio-analysis-queue"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "audio-analysis-dlq"
