name = "arborisis-audio-analysis-orchestrator"
main = "src/index.ts"
compatibility_date = "2026-05-10"
account_id = "bc36459259b257fdbaf4252f06bcb690"

[vars]
# Mode Bridge (recommandé) : dispatch vers Laravel qui gère les workers arborisis-worker
# LARAVEL_API_URL = "https://arborisis.com"
# LARAVEL_API_SECRET  →  wrangler secret put LARAVEL_API_SECRET (utiliser ANALYZER_INTERNAL_API_TOKEN de Laravel)

# Mode Legacy (fallback) : appelle directement les analyzers
# ANALYZER_URL = "https://arborisis.com/analyzer"
# ANALYZER_SECRET  →  wrangler secret put ANALYZER_SECRET
# ANALYZER_URLS  →  wrangler secret put ANALYZER_URLS (URLs multiples séparées par virgule)

[[queues.consumers]]
queue = "audio-analysis-queue"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "audio-analysis-dlq"
